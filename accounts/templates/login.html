{% extends 'base.html' %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static "css/login.css" %}">
{% endblock %}

{% block content %}
<section class="login">
    <fieldset>
        <legend>Connexion</legend>
        <form method="post">
            {% csrf_token %}
            <label>
                Adresse mail :
                <input type="email" name="email">
            </label>
            <label>
                Mot de passe :
                <input type="password" name="password">
            </label>
            <input type="submit" value="Se connecter">
            <div class="error">
                {% if messages %}
                    {% for message in messages %}
                        <div>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            </div>
        </form>
    </fieldset>
    <div class="no-account-signup">
        Pas encore de compte ? <a href="{% url 'signup' %}">S'inscrire</a>
    </div>
</section>
{% endblock %}
