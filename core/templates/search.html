{% extends 'base.html' %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'css/search.css' %}">
{% endblock %}

{% block content %}
<section class="container">
    <h2 class="section-title">Technologies</h2>
    <p class="intro-text">Explorez nos solutions connectées pour le bien-être de vos compagnons.</p>

    <div class="search-layout" id="search-app">
        <aside class="filters-sidebar">
            <form id="filter-form" @submit.prevent="updateResults">
                <h3><i class="fas fa-filter"></i> Filtres </h3>
                <input type="hidden" name="q" v-model="filters.query">

                <div class="filter-group">
                    <label for="animal"> Animal concerné</label>
                    <select name="animal" id="animal" v-model="filters.animal" @change="updateResults">
                        <option value="">Tous les animaux</option>
                        <option value="chien">Chien</option>
                        <option value="chat">Chat</option>
                        <option value="reptile">Reptile</option>
                        <option value="chien_chat">Chien & Chat</option>
                        <option value="tous">Multi-espèces (Tous)</option>
                    </select>
                </div>


                {% if user.is_authenticated and user.verified %}
                <div class="filter-group">
                    <label for="statut">Statut de l'objet</label>
                    <select name="statut" id="statut" v-model="filters.statut" @change="updateResults">
                        <option value="">Tous les statuts</option>
                        <option value="disponible">Disponible / Actif</option>
                        <option value="indisponible">Maintenance</option>
                    </select>
                </div>
                {% endif %}

                <div class="filter-group">
                    <label for="type">Catégorie</label>
                    <select name="type" id="type" v-model="filters.type" @change="updateResults">
                        <option value="">Toutes les catégories</option>
                        <option value="iot">Objets IoT</option>
                        <option value="service">Services Garderie</option>                   
                    </select>
                </div>

                <button type="button" class="btn-reset" @click="resetFilters">
                    <i class="fas fa-redo"></i> Réinitialiser les filtres
                </button>
            </form>
        </aside>

        <div class="pet-grid" id="results-container" v-html="results"></div>
    </div>
</section>

<script>
createApp({
    data() {
        return {
            filters: {
                query: '{{ query }}',
                animal: '',
                statut: '',
                type: ''
            },
            results: ''
        };
    },
    mounted() {
        this.updateResults();
    },
    methods: {
        updateResults() {
            const formData = new FormData();
            formData.append('q', this.filters.query || '');
            formData.append('animal', this.filters.animal || '');
            formData.append('statut', this.filters.statut || '');
            formData.append('type', this.filters.type || '');

            fetch('{% url "search" %}', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: formData
            })
            .then(response => response.text())
            .then(html => {
                this.results = html;
            })
            .catch(error => console.error('Erreur:', error));
        },
        resetFilters() {
            this.filters = {
                animal: '',
                statut: '',
                type: ''
            };
            this.updateResults();
        }
    }
}).mount('#search-app');
</script>

{% endblock %}
