{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coconimal | Smart Garderie & Animalerie</title>
    <link href="https://fonts.googleapis.com/css?family=Cinzel" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="home-page">
    <header>
        <div class="header-top">
            <div class="logo-area">
                <img src="https://imgur.com/F14RP1l.jpg" alt="Logo Coconimal" class="logo-mini">
                <h1 class="brand-name">Coconimal</h1>
            </div>

            <div class="search-container">
                <form action="{% url 'search' %}" method="GET">
                    <input type="text" placeholder="Rechercher une litière, lampe UV, garde..." name="q">
                    <button type="submit"><i class="fas fa-search"></i></button>
                </form>
            </div>

            <div class="user-actions">
                <a href="{% url 'login' %}" class="login-btn">
                    <i class="fas fa-user-circle"></i> <span>Se connecter</span>
                </a>
                <a href="{% url 'cart' %}" class="cart-icon">
                    <i class="fas fa-shopping-basket"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>

        <nav>
            <div class="nav-container">
                <ul>
                    <li><a href="{% url 'index' %}" class="{% if request.resolver_match.url_name == 'index'%}active"{% endif %}>
                        <i class="fas fa-home"></i> Accueil</a></li>
                    <li><a href="{% url 'boutique' %}" class="{% if request.resolver_match.url_name == 'boutique'%}active"{% endif %}>
                        <i class="fas fa-store"></i> Boutique Smart</a></li>
                    <li><a href="{% url 'garderie' %}" class="{% if request.resolver_match.url_name == 'garderie'%}active"{% endif %}>
                        <i class="fas fa-calendar-alt"></i> Réserver une Garde</a></li>
                    <li><a href="{% url 'concept' %}" class="{% if request.resolver_match.url_name == 'concept'%}active"{% endif %}>
                        <i class="fas fa-microchip"></i> Technologie</a></li>
                    <li><a href="#contact"><i class="fas fa-envelope"></i> Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <div id="contact">
            <p>Une question ? <a href="mailto:contact@coconimal.com">contact@coconimal.com</a></p>
        </div>
        <p>2026 | Projet Coconight © - Animalerie & Garderie </p>
    </footer>
</body>
</html>
