{% extends 'base.html' %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static "css/login.css" %}">
{% endblock %}

{% block content %}
<section class="login signup">
    <fieldset>
        <legend>Inscription</legend>
        <form>
            <label>
                Adresse mail :
                <input type="email" name="email">
            </label>
            <label>
                Mot de passe :
                <input type="password" name="email">
            </label>
            <input type="submit" value="S'inscrire">
            <div class="error">
            </div>
        </form>
    </fieldset>
</section>
{% endblock %}
